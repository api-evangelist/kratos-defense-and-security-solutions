principles:
  - name: Visibility
    description: Use program-specific cost reporting (DCAA-compliant CDRLs, DD250, monthly progress reports)
      to surface labor, ODC, and material costs against each Contract Line Item Number (CLIN).
  - name: Allocation
    description: Charge labor and ODCs to the correct program/CLIN; tag API/platform usage by program
      so cost rolls up to the responsible PM.
  - name: Optimization
    description: Use commercial-of-the-shelf (COTS) Kratos products where available to convert program-funded
      development to a lower-cost license model; bundle multi-program enclaves where ATO permits.
  - name: Accountability
    description: Program managers own the contract budget, EVM reporting, and milestone billing; finance
      reconciles cost performance reports against funded ceiling.
