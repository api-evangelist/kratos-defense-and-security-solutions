meters:
  - name: program_milestones
    unit: milestone
    aggregation: count
    dimensions:
      - program
      - clin
  - name: labor_hours
    unit: hour
    aggregation: sum
    dimensions:
      - labor_category
      - program
  - name: api_calls
    unit: request
    aggregation: sum
    dimensions:
      - endpoint
      - program
  - name: license_seats
    unit: seat
    aggregation: max
    dimensions:
      - product
      - program
  - name: managed_assets
    unit: asset
    aggregation: max
    dimensions:
