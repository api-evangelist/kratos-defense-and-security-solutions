specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Kratos Defense & Security Solutions
providerId: kratos-defense-and-security-solutions
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Defense
  - Security
  - Unmanned Systems
description: Kratos does not publish API rate limits in the public domain. Throttling is applied per
  program / per-customer enclave and surfaced only inside gated documentation tied to the underlying
  contract.
sources:
  - https://developer.kratosdefense.com
notes: Public rate-limit documentation is not available. Reconcile from program-specific gated documentation
  once authorized access is obtained.
responseCodes:
  throttled: 429
  serviceUnavailable: 503
limits:
  - name: Per-program API throttling
    scope: program
    metric: varies
    limit: 'see program / contract documentation'
policies:
  - name: Backoff
    description: Implement exponential backoff with jitter on 429/5xx responses; honor Retry-After.
  - name: Idempotency
    description: For state-changing endpoints, use idempotency keys and audit trail per the program's
      cybersecurity controls (e.g. NIST 800-171, CMMC).
  - name: Enclave isolation
    description: Limits and authentication scopes are typically partitioned per program enclave; cross-program
      sharing requires explicit ATO.
maintainers:
  - FN: Kin Lane
    email: kin@apievangelist.com
