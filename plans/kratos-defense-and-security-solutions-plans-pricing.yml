description: Kratos Defense & Security Solutions is a defense and national-security technology company.
  They do not publish a public API tariff; product and platform engagements (OpenSpace, NeuralStar, satellite
  ground systems, target drones, training/simulation) are sold under government contracts (DoD, IC, civil)
  and commercial defense procurement vehicles. Pricing is contract-specific and typically classified
  / sensitive.
sources:
  - https://developer.kratosdefense.com
  - https://www.kratosdefense.com
notes: No public API pricing. Programs are procured via FAR/DFARS contract vehicles, GSA schedules, OTAs,
  or commercial-defense agreements. Reconcile from program-specific contract documentation when authorized
  access is obtained.
